```yaml
version: '3.8'

services:
  # ── Bot ETH ────────────────────────────────────────────
  vwap-eth:
    build: .
    container_name: vwap-eth
    restart: unless-stopped
    env_file: .env.eth
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_ID=ETH
    volumes:
      - ./dashboard/data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Bot BTC ────────────────────────────────────────────
  vwap-btc:
    build: .
    container_name: vwap-btc
    restart: unless-stopped
    env_file: .env.btc
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_ID=BTC
    volumes:
      - ./dashboard/data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard (Nginx) ──────────────────────────────────
  vwap-dashboard:
    image: nginx:latest
    container_name: vwap-dashboard
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./dashboard/index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/data:/usr/share/nginx/html/logs:ro