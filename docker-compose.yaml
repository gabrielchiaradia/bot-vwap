# ══════════════════════════════════════════════════════════
#  docker-compose.yml — VWAP Trading Bot
#
#  Servicios:
#    vwap-eth    → Bot 1 (lee .env.eth)
#    vwap-btc    → Bot 2 (lee .env.btc) — descomentarear para activar
#
#    dashboard   → nginx para visualizar resultados
#
#  Uso:
#    docker compose up -d          # Arrancar en background
#    docker compose logs -f vwap   # Ver logs en tiempo real
#    docker compose down           # Detener
#    docker compose pull && docker compose up -d  # Actualizar
# ══════════════════════════════════════════════════════════
version: '3.8'

services:
  # ── Bot ETH ────────────────────────────────────────────
  vwap-eth:
    build: .
    container_name: vwap-eth
    restart: unless-stopped
    env_file: .env.eth
    user: "1000:1000"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_ID=ETH
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - ./dashboard/data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Bot BTC ────────────────────────────────────────────
  vwap-btc:
    build: .
    container_name: vwap-btc
    restart: unless-stopped
    env_file: .env.btc
    user: "1000:1000"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - BOT_ID=BTC
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - ./dashboard/data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard (Nginx) ──────────────────────────────────
  vwap-dashboard:
    image: nginx:latest
    container_name: vwap-dashboard
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./dashboard/index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/data:/usr/share/nginx/html/data:ro
      - ./backtest:/usr/share/nginx/html/backtest:ro
    
      