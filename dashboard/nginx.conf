# ══════════════════════════════════════════════════════════
#  dashboard/nginx.conf - Versión Corregida
# ══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # Directorio raíz (donde está tu index.html)
    root /usr/share/nginx/html;

    # SEGURIDAD: Solo si tienes el archivo .htpasswd configurado. 
    # Si te da error, comenta estas dos líneas con #
    auth_basic           "VWAP Bot Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Rutas ─────────────────────────────────────────────

    # 1. Dashboard principal
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Carpeta de DATOS (Donde están los JSON de ETH y BTC)
    # Importante: El 'alias' debe coincidir con la carpeta interna del contenedor
    location /data/ {
        alias /usr/share/nginx/html/data/; 
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Content-Type "application/json; charset=utf-8";
        
        # Evita el error 403 permitiendo el acceso
        limit_except GET {
            allow all;
        }
    }

    # 3. Soporte para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|json)$ {
        expires max;
        log_not_found off;
        add_header Access-Control-Allow-Origin *;
    }
}