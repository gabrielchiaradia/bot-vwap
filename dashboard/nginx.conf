server {
    listen 80;
    root /usr/share/nginx/html;

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Esta ruta ahora sí coincide con tu volumen de Docker
    location /data/ {
        alias /usr/share/nginx/html/data/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }
}