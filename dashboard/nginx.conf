server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API en vivo (Bot ETH/BTC)
    location /data/ {
        alias /usr/share/nginx/html/data/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # API de Backtests
    location /backtest/ {
        alias /usr/share/nginx/html/backtest/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }
}