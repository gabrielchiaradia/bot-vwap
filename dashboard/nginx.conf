server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # 1. Dashboard Principal
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Carpeta de DATOS (Donde el bot escribe)
    # Cambiamos 'alias' por 'root' para evitar errores de interpretación de Nginx
    location /data/ {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache"; # Para que los datos se actualicen real
    }
}