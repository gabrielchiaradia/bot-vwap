<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scalping Bot Live — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root,[data-theme="dark"]{--bg:#080c10;--surface:#0d1117;--surface2:#131b24;--border:#1e2d3d;--accent:#f59e0b;--accent2:#7c3aed;--green:#00e676;--red:#ff3d57;--yellow:#ffd600;--text:#c9d1d9;--text-strong:#fff;--muted:#4a5568;--glow:0 0 20px rgba(245,158,11,.15);--header-grad:linear-gradient(180deg,#0a1520 0%,var(--bg) 100%);--tooltip-bg:#0d1117;--tooltip-border:#1e2d3d}
  [data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--accent:#d97706;--accent2:#6d28d9;--green:#059669;--red:#dc2626;--yellow:#b45309;--text:#334155;--text-strong:#0f172a;--muted:#64748b;--glow:none;--header-grad:linear-gradient(180deg,#e2e8f0 0%,var(--bg) 100%)}
  
  *{margin:0;padding:0;box-sizing:border-box;font-family:'JetBrains Mono',monospace}
  body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  
  /* Selector de Bot */
  .bot-selector {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 10px;
    background: var(--surface2);
    padding: 5px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .bot-btn {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .bot-btn.active {
    background: var(--accent);
    color: #000;
  }

  .status-bar {
    background: var(--surface);
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--green);
    font-size: 0.9rem;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

  header{padding:40px 20px;text-align:center;background:var(--header-grad);position:relative}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;color:var(--text-strong);letter-spacing:-1px}
  
  .container{max-width:1200px;margin:0 auto;padding:20px}
  
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
  .stat-card{background:var(--surface);padding:20px;border-radius:12px;border:1px solid var(--border);transition:0.3s}
  .stat-card:hover{border-color:var(--accent);box-shadow:var(--glow)}
  .stat-label{font-size:0.8rem;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .stat-val{font-size:1.5rem;font-weight:700;color:var(--text-strong)}
  
  .chart-container{background:var(--surface);padding:25px;border-radius:16px;border:1px solid var(--border);margin-bottom:30px;height:400px}
  
  .trades-table{width:100%;border-collapse:collapse;margin-top:20px;background:var(--surface);border-radius:12px;overflow:hidden}
  .trades-table th{background:var(--surface2);padding:15px;text-align:left;font-size:0.8rem;color:var(--muted);text-transform:uppercase}
  .trades-table td{padding:12px 15px;border-bottom:1px solid var(--border);font-size:0.9rem}
  .win{color:var(--green);font-weight:bold}
  .loss{color:var(--red);font-weight:bold}

  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }
</style>
</head>
<body>

<div id="loading-screen">
    <div class="dot" style="width:40px; height:40px;"></div>
    <p style="margin-top:20px;">Conectando con el Bot en Vultr...</p>
</div>

<div class="bot-selector">
    <button class="bot-btn active" onclick="cambiarBot('ETH')">ETH</button>
    <button class="bot-btn" onclick="cambiarBot('BTC')">BTC</button>
</div>

<div class="status-bar">
    <div class="live-indicator">
        <div class="dot"></div>
        LIVE: <span id="current-bot-display">ETH-USDT</span>
    </div>
    <div id="last-update" style="font-size: 0.8rem; color: var(--muted);">Actualizando...</div>
</div>

<header>
    <h1>SCALP BOT <span style="color:var(--accent)">LIVE</span></h1>
    <p>Dashboard de monitoreo en tiempo real</p>
</header>

<div class="container">
    <div class="grid-stats" id="stats-grid">
        </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div style="overflow-x:auto;">
        <table class="trades-table" id="trades-body">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Resultado</th>
                    <th>PnL %</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let currentBot = 'ETH';
let myChart = null;

function cambiarBot(bot) {
    currentBot = bot;
    document.querySelectorAll('.bot-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('current-bot-display').innerText = bot + '-USDT';
    fetchData();
}

async function fetchData() {
    try {
        const t = Date.now();
        // Intentamos cargar el archivo JSON que genera el bot
        const response = await fetch(`data/dashboard_trades_${currentBot}.json?t=${t}`);
        
        if (!response.ok) throw new Error('Archivo no encontrado');

        const trades = await response.json();
        renderDashboard(trades);
        
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('last-update').innerText = 'Ult. Actualización: ' + new Date().toLocaleTimeString();

    } catch (err) {
        console.error("Error cargando datos:", err);
        // Si falla, es que el bot aun no crea el archivo o hay 403
    }
}
